<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightOut Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Friday Night Out 🎉</h1>
        <p class="subtitle">Join us for the ultimate city nightlife experience.</p>
        
        <div class="event-details">
            <p><strong>Date:</strong> Next Friday</p>
            <p><strong>Time:</strong> 8:00 PM - Late</p>
            <p><strong>Price:</strong> $25 per ticket</p>
        </div>

        <div class="booking-card">
            <h2>Book Your Tickets</h2>
            <label for="tickets">Number of Tickets:</label>
            <select id="tickets">
                <option value="1">1 Ticket</option>
                <option value="2">2 Tickets</option>
                <option value="3">3 Tickets</option>
                <option value="4">4 Tickets</option>
            </select>
            
            <button id="payButton" class="btn">Pay Now ($25)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
