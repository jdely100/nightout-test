<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almost Done! - NightOut</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Payment Successful! 🎟️</h1>
        <p class="subtitle">Please answer these quick questions to finish your booking.</p>

        <form id="questionsForm" class="booking-card">
            <div class="form-group">
                <label for="diet">Any dietary restrictions or allergies?</label>
                <input type="text" id="diet" placeholder="e.g., None, Vegetarian, Peanut allergy" required>
            </div>

            <div class="form-group">
                <label for="song">What song gets you on the dance floor?</label>
                <input type="text" id="song" placeholder="Your favorite anthem" required>
            </div>

            <button type="submit" class="btn">Submit & Confirm</button>
        </form>
    </div>

    <script>
        document.getElementById('questionsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('All set! Your preferences are saved. See you there!');
            window.location.href = 'index.html'; 
        });
    </script>
</body>
</html>
